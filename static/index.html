<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
    <title>Informed - SurgeonAgent</title>
    <style>
        :root {
            /* Brand colors from Informed logo */
            --cyan: #00D4FF;
            --magenta: #E040FB;
            --gradient: linear-gradient(135deg, var(--cyan), var(--magenta));

            /* Dark mode palette */
            --bg-primary: #0B0F19;
            --bg-secondary: #111827;
            --bg-surface: #1A2233;
            --bg-elevated: #222D3F;
            --border: #2A3548;

            /* Text */
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            height: -webkit-fill-available;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            height: 100dvh;
            height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ---- Header ---- */
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .logo {
            height: 32px;
            width: auto;
        }

        .header-divider {
            width: 1px;
            height: 28px;
            background: var(--border);
        }

        .header-text h1 {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.02em;
        }

        .header-text .subtitle {
            font-size: 12px;
            color: var(--text-muted);
        }

        #status {
            margin-left: auto;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            color: var(--text-muted);
            font-weight: 500;
        }
        #status.connected { background: rgba(0,212,255,0.15); color: var(--cyan); }
        #status.connecting { background: rgba(224,64,251,0.15); color: var(--magenta); }
        #status.error { background: rgba(239,68,68,0.15); color: #ef4444; }

        /* ---- Chat area ---- */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        /* Scrollbar styling */
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        #chat-container::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ---- Messages ---- */
        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14.5px;
            word-wrap: break-word;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #0e4f7a, #1a3a5c);
            color: var(--text-primary);
            border: 1px solid rgba(0,212,255,0.2);
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--bg-surface);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* Markdown formatting inside assistant messages */
        .message.assistant h2,
        .message.assistant h3 {
            margin-top: 14px;
            margin-bottom: 6px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .message.assistant h2 { font-size: 16px; }
        .message.assistant h3 { font-size: 14.5px; }

        .message.assistant table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 13px;
            border-radius: 8px;
            overflow: hidden;
        }
        .message.assistant th {
            background: var(--bg-elevated);
            color: var(--cyan);
            padding: 9px 10px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 2px solid var(--cyan);
        }
        .message.assistant td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .message.assistant tr:nth-child(even) td {
            background: rgba(255,255,255,0.02);
        }
        .message.assistant tr:hover td {
            background: rgba(0,212,255,0.04);
        }

        .message.assistant strong { color: var(--cyan); }

        .message.assistant blockquote {
            border-left: 3px solid var(--magenta);
            padding: 8px 14px;
            margin: 8px 0;
            background: rgba(224,64,251,0.06);
            border-radius: 0 8px 8px 0;
            font-size: 13.5px;
            color: var(--text-secondary);
        }

        .message.assistant ul, .message.assistant ol {
            padding-left: 20px;
            margin: 6px 0;
        }
        .message.assistant li { margin: 4px 0; color: var(--text-secondary); }

        .message.assistant hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 14px 0;
        }

        .message.assistant code {
            background: var(--bg-elevated);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            color: var(--magenta);
        }

        .message.assistant pre {
            background: var(--bg-elevated);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .message.assistant pre code {
            background: none;
            padding: 0;
            color: var(--text-secondary);
        }

        .message.system {
            align-self: center;
            background: rgba(224,64,251,0.1);
            color: var(--magenta);
            font-size: 13px;
            text-align: center;
            border-radius: 8px;
            border: 1px solid rgba(224,64,251,0.2);
        }

        /* ---- Download button ---- */
        .download-link {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 22px;
            background: var(--gradient);
            color: #0B0F19;
            text-decoration: none;
            border-radius: 8px;
            font-size: 13.5px;
            font-weight: 700;
            transition: opacity 0.15s, transform 0.15s;
        }
        .download-link:hover { opacity: 0.9; transform: translateY(-1px); }

        /* ---- Typing indicator ---- */
        .typing-indicator {
            align-self: flex-start;
            padding: 14px 18px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            display: none;
        }
        .typing-indicator.visible { display: flex; gap: 5px; align-items: center; }
        .typing-indicator span {
            width: 8px; height: 8px;
            background: var(--cyan);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
            opacity: 0.4;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; background: #70E0FF; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; background: var(--magenta); }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* ---- Input area ---- */
        #input-area {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 14px 24px;
            padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
            flex-shrink: 0;
        }

        #input-form {
            display: flex;
            gap: 10px;
            max-width: 900px;
            margin: 0 auto;
        }

        #user-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 14.5px;
            outline: none;
            background: var(--bg-surface);
            color: var(--text-primary);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        #user-input::placeholder { color: var(--text-muted); }
        #user-input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.12);
        }
        #user-input:disabled {
            background: var(--bg-primary);
            color: var(--text-muted);
        }

        #send-btn {
            padding: 12px 28px;
            background: var(--gradient);
            color: #0B0F19;
            border: none;
            border-radius: 12px;
            font-size: 14.5px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.15s;
        }
        #send-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        #send-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }

        /* ---- Procedure selector ---- */
        .procedure-selector {
            align-self: stretch;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        .procedure-selector .selector-header {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-style: italic;
        }

        .procedure-category {
            margin-bottom: 10px;
        }

        .procedure-category .category-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .procedure-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .procedure-chip {
            padding: 7px 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .procedure-chip:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--cyan);
            color: var(--cyan);
            transform: translateY(-1px);
        }

        .procedure-chip:active {
            transform: translateY(0);
        }

        /* ---- Mobile ---- */
        @media (max-width: 600px) {
            header { padding: 10px 14px; gap: 10px; }
            .logo { height: 26px; }
            .header-divider { height: 22px; }
            .header-text h1 { font-size: 15px; }
            .header-text .subtitle { display: none; }
            #chat-container { padding: 10px; gap: 10px; }
            .message { max-width: 92%; font-size: 14px; padding: 12px 14px; }
            #input-area { padding: 10px 12px; padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px)); }
            #user-input { padding: 10px 12px; font-size: 16px; }
            #send-btn { padding: 10px 18px; font-size: 14px; }
            .procedure-selector { max-width: 92%; }
            .procedure-chip { font-size: 12px; padding: 6px 11px; }
            .procedure-category .category-label { font-size: 10px; }
        }
    </style>
</head>
<body>
    <header>
        <img src="/logo.png" alt="Informed" class="logo" />
        <div class="header-divider"></div>
        <div class="header-text">
            <h1>SurgeonAgent</h1>
            <div class="subtitle">Find the best surgeon for your procedure</div>
        </div>
        <div id="status" class="connecting">Connecting...</div>
    </header>

    <div id="chat-container">
        <div class="typing-indicator" id="typing">
            <span></span><span></span><span></span>
        </div>
    </div>

    <div id="input-area">
        <form id="input-form">
            <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off" disabled />
            <button type="submit" id="send-btn" disabled>Send</button>
        </form>
    </div>

    <script>
        const chatContainer = document.getElementById("chat-container");
        const typingIndicator = document.getElementById("typing");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");
        const statusEl = document.getElementById("status");
        const inputForm = document.getElementById("input-form");

        const sessionId = crypto.randomUUID();
        let ws = null;
        let currentAssistantEl = null;
        let currentText = "";
        let waitingForResponse = false;
        let procedureSelectorShown = false;
        let isFirstTurn = true;

        // Procedure categories for clickable chips
        const procedureCategories = [
            { label: "Orthopedic", procedures: ["Knee Replacement", "Hip Replacement"] },
            { label: "General Surgery", procedures: ["Cholecystectomy", "Appendectomy", "Splenectomy", "Pancreatectomy"] },
            { label: "Hernia", procedures: ["Abdominal Hernia", "Inguinal Hernia", "Hiatal Hernia"] },
            { label: "Bariatric", procedures: ["Gastric Bypass", "Sleeve Gastrectomy", "Lap Band Removal", "Other Bariatrics"] },
            { label: "Gynecologic", procedures: ["Hysterectomy - Benign", "Hysterectomy - Malignant"] },
            { label: "Colorectal", procedures: ["Colon", "Rectal"] },
            { label: "Thoracic", procedures: ["Lung Resection", "Other Thoracic"] },
            { label: "Urologic", procedures: ["Prostatectomy"] },
        ];

        function showProcedureSelector() {
            if (procedureSelectorShown) return;
            procedureSelectorShown = true;

            const container = document.createElement("div");
            container.className = "procedure-selector";
            container.id = "procedure-selector";

            procedureCategories.forEach(cat => {
                const catDiv = document.createElement("div");
                catDiv.className = "procedure-category";

                const label = document.createElement("div");
                label.className = "category-label";
                label.textContent = cat.label;
                catDiv.appendChild(label);

                const chips = document.createElement("div");
                chips.className = "procedure-chips";

                cat.procedures.forEach(proc => {
                    const chip = document.createElement("button");
                    chip.className = "procedure-chip";
                    chip.textContent = proc;
                    chip.type = "button";
                    chip.addEventListener("click", () => selectProcedure(proc));
                    chips.appendChild(chip);
                });

                catDiv.appendChild(chips);
                container.appendChild(catDiv);
            });

            chatContainer.insertBefore(container, typingIndicator);
            scrollToBottom();
        }

        function selectProcedure(procedureName) {
            if (waitingForResponse || !ws || ws.readyState !== WebSocket.OPEN) return;

            // Remove the selector
            hideProcedureSelector();

            // Send as a regular message
            addMessage("user", procedureName);
            userInput.value = "";
            waitingForResponse = true;
            setInputEnabled(false);
            typingIndicator.classList.add("visible");
            scrollToBottom();

            ws.send(JSON.stringify({ message: procedureName }));
        }

        function hideProcedureSelector() {
            const sel = document.getElementById("procedure-selector");
            if (sel) {
                sel.style.opacity = "0";
                sel.style.transform = "translateY(-6px)";
                sel.style.transition = "opacity 0.2s, transform 0.2s";
                setTimeout(() => sel.remove(), 200);
            }
        }

        // Generic inline options (for gender, health status, etc.)
        function showInlineOptions(options) {
            // Remove any existing inline options group first
            hideInlineOptions();
            if (!options || !options.length) return;

            const container = document.createElement("div");
            container.className = "procedure-selector inline-options";
            container.id = "inline-options";

            const chips = document.createElement("div");
            chips.className = "procedure-chips";

            options.forEach(opt => {
                const chip = document.createElement("button");
                chip.className = "procedure-chip";
                chip.textContent = opt;
                chip.type = "button";
                chip.addEventListener("click", () => selectInlineOption(opt));
                chips.appendChild(chip);
            });

            container.appendChild(chips);
            chatContainer.insertBefore(container, typingIndicator);
            scrollToBottom();
        }

        function selectInlineOption(optText) {
            if (waitingForResponse || !ws || ws.readyState !== WebSocket.OPEN) return;
            hideInlineOptions();
            addMessage("user", optText);
            userInput.value = "";
            waitingForResponse = true;
            setInputEnabled(false);
            typingIndicator.classList.add("visible");
            scrollToBottom();
            ws.send(JSON.stringify({ message: optText }));
        }

        function hideInlineOptions() {
            const el = document.getElementById("inline-options");
            if (el) {
                el.style.opacity = "0";
                el.style.transform = "translateY(-6px)";
                el.style.transition = "opacity 0.2s, transform 0.2s";
                setTimeout(() => el.remove(), 200);
            }
        }

        function setStatus(text, cls) {
            statusEl.textContent = text;
            statusEl.className = cls;
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Extract [[OPTIONS: A | B | C]] markers from assistant text.
        // Returns { cleanText, options } — options is null if no marker found.
        const OPTIONS_REGEX = /\[\[OPTIONS:\s*([^\]]+?)\s*\]\]/;
        function extractOptions(text) {
            const match = text.match(OPTIONS_REGEX);
            if (!match) return { cleanText: text, options: null };
            const cleanText = text.replace(OPTIONS_REGEX, "").replace(/\s+$/, "");
            const options = match[1].split("|").map(s => s.trim()).filter(Boolean);
            return { cleanText, options };
        }

        // Simple markdown-to-HTML converter
        function renderMarkdown(text) {
            // Strip OPTIONS marker before rendering so it never flashes in the UI
            text = extractOptions(text).cleanText;

            let html = text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");

            // Code blocks
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, "<pre><code>$2</code></pre>");
            html = html.replace(/`([^`]+)`/g, "<code>$1</code>");

            // Tables
            html = html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)*)/gm, (match, headerRow, sepRow, bodyRows) => {
                const headers = headerRow.split("|").filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join("");
                const rows = bodyRows.trim().split("\n").map(row => {
                    const cells = row.split("|").filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join("");
                    return `<tr>${cells}</tr>`;
                }).join("");
                return `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
            });

            // Headers
            html = html.replace(/^### (.+)$/gm, "<h3>$1</h3>");
            html = html.replace(/^## (.+)$/gm, "<h2>$1</h2>");

            // Horizontal rules
            html = html.replace(/^---+$/gm, "<hr>");

            // Blockquotes
            html = html.replace(/^&gt; (.+)$/gm, "<blockquote>$1</blockquote>");

            // Bold and italic
            html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
            html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");

            // Unordered lists
            html = html.replace(/^- (.+)$/gm, "<li>$1</li>");
            html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, "<ul>$1</ul>");

            // Numbered lists
            html = html.replace(/^\d+\. (.+)$/gm, "<li>$1</li>");

            // Line breaks
            html = html.replace(/\n\n/g, "<br><br>");
            html = html.replace(/\n/g, "<br>");

            return html;
        }

        function addMessage(role, content) {
            const div = document.createElement("div");
            div.className = `message ${role}`;
            if (role === "assistant") {
                div.innerHTML = renderMarkdown(content);
            } else {
                div.textContent = content;
            }
            chatContainer.insertBefore(div, typingIndicator);
            scrollToBottom();
            return div;
        }

        function addDownloadLink(filename, url) {
            const div = document.createElement("div");
            div.className = "message assistant";
            div.innerHTML = `<strong>Profile ready for download:</strong><br>
                <a class="download-link" href="${url}" download="${filename}">
                    Download ${filename}
                </a>`;
            chatContainer.insertBefore(div, typingIndicator);
            scrollToBottom();
        }

        function setInputEnabled(enabled) {
            userInput.disabled = !enabled;
            sendBtn.disabled = !enabled;
            if (enabled) userInput.focus();
        }

        function connect() {
            setStatus("Connecting...", "connecting");
            const protocol = location.protocol === "https:" ? "wss:" : "ws:";
            ws = new WebSocket(`${protocol}//${location.host}/ws/${sessionId}`);

            ws.onopen = () => {
                setStatus("Connected", "connected");
                setInputEnabled(false);
                waitingForResponse = true;
                typingIndicator.classList.add("visible");
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.type === "text") {
                    typingIndicator.classList.remove("visible");
                    if (!currentAssistantEl) {
                        currentText = data.content;
                        currentAssistantEl = addMessage("assistant", currentText);
                    } else {
                        currentText += "\n\n" + data.content;
                        currentAssistantEl.innerHTML = renderMarkdown(currentText);
                        scrollToBottom();
                    }
                } else if (data.type === "file_ready") {
                    addDownloadLink(data.filename, data.download_url);
                } else if (data.type === "done") {
                    typingIndicator.classList.remove("visible");

                    // Check the just-completed assistant message for an OPTIONS marker
                    const { options } = extractOptions(currentText || "");

                    currentAssistantEl = null;
                    currentText = "";
                    waitingForResponse = false;
                    setInputEnabled(true);

                    // Show procedure chips after the agent's first greeting
                    if (isFirstTurn) {
                        isFirstTurn = false;
                        showProcedureSelector();
                    } else if (options) {
                        // Render generic inline options (gender, health, etc.)
                        showInlineOptions(options);
                    }
                } else if (data.type === "error") {
                    typingIndicator.classList.remove("visible");
                    addMessage("system", "Error: " + data.content);
                    waitingForResponse = false;
                    setInputEnabled(true);
                }
            };

            ws.onclose = () => {
                setStatus("Disconnected", "error");
                setInputEnabled(false);
                addMessage("system", "Connection lost. Refresh the page to start a new session.");
            };

            ws.onerror = () => {
                setStatus("Error", "error");
            };
        }

        inputForm.addEventListener("submit", (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text || waitingForResponse || !ws || ws.readyState !== WebSocket.OPEN) return;

            // Hide any selectors if user types manually
            hideProcedureSelector();
            hideInlineOptions();

            addMessage("user", text);
            userInput.value = "";
            waitingForResponse = true;
            setInputEnabled(false);
            typingIndicator.classList.add("visible");
            scrollToBottom();

            ws.send(JSON.stringify({ message: text }));
        });

        // iOS Safari: handle virtual keyboard resizing the viewport
        if (window.visualViewport) {
            window.visualViewport.addEventListener("resize", () => {
                document.body.style.height = window.visualViewport.height + "px";
                scrollToBottom();
            });
            window.visualViewport.addEventListener("scroll", () => {
                document.body.style.height = window.visualViewport.height + "px";
            });
        }

        // Start connection
        connect();
    </script>
</body>
</html>
